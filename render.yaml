# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect repo → New Blueprint → select this file.
# Set NEXT_PUBLIC_* on the web service to the API's public URL before first web deploy.

databases:
  - name: solutiva-db
    databaseName: solutiva_court
    user: solutiva
    plan: free

services:
  - type: redis
    name: solutiva-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: solutiva-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PORT
        value: "4000"
      - key: CHAIN_ENABLED
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: solutiva-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: solutiva-redis
          property: connectionString
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: solutiva-web
    runtime: docker
    dockerfilePath: apps/web/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        sync: false
      - key: NEXT_PUBLIC_CHAIN_ENABLED
        value: "false"
